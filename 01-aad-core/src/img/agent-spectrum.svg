  <text x="108" y="70" font-family="Georgia, serif" font-size="10" fill="#2E8B8B" font-weight="bold">SECTION I</text>
  <rect x="337" y="52" width="251" height="168" rx="5" fill="none" stroke="#E8601C" stroke-width="2" stroke-dasharray="6,3"/>
