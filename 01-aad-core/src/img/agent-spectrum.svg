  <text x="100" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#1A6666">absent</text>
  <text x="590" y="440" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#1A6666">structured</text>
