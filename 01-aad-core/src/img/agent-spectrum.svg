<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 520" width="650" height="520">
  <!-- Figure: The Agent Spectrum -->
  <!-- Caption: Two independent dimensions — model richness and objective richness — define four regions
       of a continuum. Section I covers adaptive trackers (upper-left). Section II adds actuated agents
       (upper-right) that model reality AND pursue objectives. Real agents populate the space between
       these idealized regions and may migrate during operation. -->
  <defs>
    <marker id="ax-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1A3A5C"/></marker>
  </defs>
