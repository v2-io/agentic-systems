  <text x="220" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1A3A5C" font-weight="bold">Reactive System</text>
  <text x="220" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#1A6666" font-style="italic">Fixed input-output rule</text>
  <text x="220" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1A3A5C" font-weight="bold">Adaptive Tracker</text>
  <text x="220" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#1A6666" font-style="italic">Models reality, no goal</text>
